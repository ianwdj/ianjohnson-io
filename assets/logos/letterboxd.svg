<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 28" role="img" aria-label="Letterboxd">
  <!-- Three overlapping dots. Brand colors are NOT baked in: fill uses currentColor
       so the mark inherits its color per location. A colored brand variant is
       inlined directly in index.html for the cover bookmarks. -->
  <g fill="currentColor">
    <circle cx="15" cy="14" r="13"/>
    <circle cx="40" cy="14" r="13"/>
    <circle cx="65" cy="14" r="13"/>
  </g>
</svg>
